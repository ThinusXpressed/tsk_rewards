services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/tsk.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=true
      - ADMIN_NAME=${ADMIN_NAME:-Administrator}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MARSHALL_NAME=${MARSHALL_NAME:-Marshall}
      - MARSHALL_USERNAME=${MARSHALL_USERNAME:-marshall}
      - MARSHALL_PASSWORD=${MARSHALL_PASSWORD}
    volumes:
      - ./data:/data
    restart: unless-stopped
