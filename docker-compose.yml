services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://tsk:${DB_PASSWORD}@postgres:5432/tsk_rewards
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tsk
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tsk_rewards
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsk -d tsk_rewards"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: tsk
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: tsk_rewards
      BACKUP_REMOTE_PATH: ${BACKUP_REMOTE_PATH:-}
    volumes:
      - backup_data:/backups
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chmod +x /usr/local/bin/backup.sh
        echo "0 2 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backup_data:
