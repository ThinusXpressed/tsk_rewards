services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/tsk.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=true
      - ADMIN_NAME=${ADMIN_NAME:-Administrator}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MARSHALL_NAME=${MARSHALL_NAME:-Marshall}
      - MARSHALL_USERNAME=${MARSHALL_USERNAME:-marshall}
      - MARSHALL_PASSWORD=${MARSHALL_PASSWORD}
      - BOLT_API_URL=${BOLT_API_URL}
      - BOLT_API_KEY=${BOLT_API_KEY}
      - NEXT_PUBLIC_BOLT_URL=${NEXT_PUBLIC_BOLT_URL}
      - CRON_SECRET=${CRON_SECRET}
      - MARSHAL_PASSCODE_TURTLES=${MARSHAL_PASSCODE_TURTLES}
      - MARSHAL_PASSCODE_SEALS=${MARSHAL_PASSCODE_SEALS}
      - MARSHAL_PASSCODE_DOLPHINS=${MARSHAL_PASSCODE_DOLPHINS}
      - MARSHAL_PASSCODE_SHARKS=${MARSHAL_PASSCODE_SHARKS}
      - MARSHAL_PASSCODE_FREE_SURFERS=${MARSHAL_PASSCODE_FREE_SURFERS}
    volumes:
      - ./data:/data
    networks:
      - default
      - infra_default
    restart: unless-stopped

networks:
  infra_default:
    external: true
